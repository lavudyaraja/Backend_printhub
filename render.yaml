# Render Blueprint — deploys the Prinsta admin backend.
# In Render: New + → Blueprint → pick this repo. It reads this file.
# (Or set the same values manually on an existing Web Service.)
#
# Cloud-only, admin-only backend: no hardware, no IoT/MQTT, no object storage.
# All state lives in Neon PostgreSQL.
services:
  - type: web
    name: prinsta-admin-backend
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong secret
      - key: DATABASE_URL
        sync: false                # paste your Neon connection string
      - key: GOOGLE_CLIENT_ID
        sync: false                # Google OAuth client ID (admin console)
      - key: APP_URL
        sync: false                # https://prinsta.app (encoded into printer QR codes)
      - key: BACKEND_URL
        sync: false                # https://prinsta-admin-backend.onrender.com
      - key: CORS_ORIGINS
        sync: false                # your admin domain, or *
      - key: RAZORPAY_KEY_ID
        sync: false                # rzp_test_… (swap to rzp_live_… to go live)
      - key: RAZORPAY_KEY_SECRET
        sync: false                # Razorpay key secret
